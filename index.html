<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>시료채취 지도 (모바일 완벽 최적화)</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet-locatecontrol/0.79.0/L.Control.Locate.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-locatecontrol/0.79.0/L.Control.Locate.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; }
        #map { position: absolute; top: 0; bottom: 0; right: 0; left: 0; }
        #iphone-compass-btn {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 9999;
            padding: 12px 24px; font-size: 16px; font-weight: bold; background-color: #FF3B30; 
            color: white; border: none; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .jibun-text {
            font-size: 10pt; color: white; font-weight: bold; 
            text-shadow: -1px 0 black, 0 1px black, 1px 0 black, 0 -1px black; 
            text-align: center; white-space: nowrap;
            pointer-events: none; 
        }
    </style>
</head>
<body>

    <div id="map"></div>
    <button id="iphone-compass-btn">🧭 아이폰 나침반 허용하기</button>

    <script>
        // [1] 지도 초기화
        var map = L.map('map', { zoomSnap: 0, zoomDelta: 0.5 });

        L.tileLayer('https://xdworld.vworld.kr/2d/Satellite/service/{z}/{x}/{y}.jpeg', { maxZoom: 22, maxNativeZoom: 19, attribution: 'VWORLD' }).addTo(map);
        L.tileLayer('https://xdworld.vworld.kr/2d/Hybrid/service/{z}/{x}/{y}.png', { maxZoom: 22, maxNativeZoom: 19, attribution: 'VWORLD_Hybrid' }).addTo(map);

        L.control.locate({
            position: 'topleft', showCompass: true,
            locateOptions: { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 },
            markerStyle: { fillColor: '#007AFF', fillOpacity: 1.0, weight: 2, color: 'white', radius: 8 },
            compassStyle: { fillColor: '#FF3B30', fillOpacity: 0.8, weight: 1.5, color: 'white', radius: 8 }
        }).addTo(map);

        // =====================================================================
        // [2] 데이터 로딩 (1번 땅 보험용 팝업 복구 완료)
        // =====================================================================
        var geojsonFileName = '16.geojson'; 
        
        var activeSubLayer = null;
        var activeSubMarker = null;

        fetch(geojsonFileName)
            .then(response => response.json())
            .then(data => {
                var geojsonLayer = L.geoJson(data, {
                    // 🎨 1. 디자인 분리
                    style: function(feature) {
                        var isMain = feature.properties.is_main;
                        var isTarget = (isMain === undefined || isMain === 1); 

                        if (isTarget) {
                            // 🌟 주인공: 팝업창 터치 인식을 위해 interactive를 다시 true로 설정합니다.
                            return { color: 'red', weight: 3, fillColor: 'transparent', interactive: true };
                        } else {
                            return { color: 'transparent', weight: 0, fillColor: 'transparent', fillOpacity: 0, interactive: true };
                        }
                    },
                    
                    // 🏷️ 2. 마커 및 팝업 설정
                    onEachFeature: function(feature, layer) {
                        var jibun = feature.properties.JIBUN || 'N/A';
                        
                        var pointInside = turf.pointOnFeature(feature);
                        var center = [pointInside.geometry.coordinates[1], pointInside.geometry.coordinates[0]];

                        var isMain = feature.properties.is_main;
                        var isTarget = (isMain === undefined || isMain === 1);

                        if (isTarget) {
                            // 🌟 [복구] 1번 땅 클릭 시 지번을 크게 띄워줄 보험용 팝업 결합
                            var popupHTML = `
                                <div style="text-align: center; margin: 2px;">
                                    <strong style="font-size: 16px; color: #FF3B30;">${jibun}</strong>
                                </div>
                            `;
                            layer.bindPopup(popupHTML);

                            // 상시 표시용 하얀 글씨 마커도 그대로 유지
                            L.marker(center, {
                                interactive: false, 
                                icon: L.divIcon({
                                    className: 'empty',
                                    html: `<div class="jibun-text">${jibun}</div>`,
                                    iconSize: [150, 36],
                                    iconAnchor: [75, 18]
                                })
                            }).addTo(map);
                            
                        } else {
                            // 2번 주변 땅: 클릭 시 파란 선과 파란 글씨 띄우기
                            layer.on('click', function(e) {
                                L.DomEvent.stopPropagation(e); 

                                if (activeSubLayer) {
                                    activeSubLayer.setStyle({ color: 'transparent', weight: 0 });
                                    map.removeLayer(activeSubMarker);
                                }

                                layer.setStyle({ color: '#007AFF', weight: 3 });
                                
                                activeSubMarker = L.marker(center, {
                                    interactive: false,
                                    icon: L.divIcon({
                                        className: 'empty',
                                        html: `<div class="jibun-text" style="color: #007AFF; text-shadow: -1px 0 white, 0 1px white, 1px 0 white, 0 -1px white;">${jibun}</div>`,
                                        iconSize: [150, 36],
                                        iconAnchor: [75, 18]
                                    })
                                }).addTo(map);

                                activeSubLayer = layer; 
                            });
                        }
                    }
                }).addTo(map);
                
                map.fitBounds(geojsonLayer.getBounds(), { padding: [50, 50] });
            })
            .catch(console.error);


        // =====================================================================
        // [3] 스마트 클릭 & 드래그 통제 시스템
        // =====================================================================
        map.doubleClickZoom.disable();  
        var clickTimer = null;
        var clickCount = 0; 
        var isPopupOpen = false;

        map.on('popupopen', function() { isPopupOpen = true; });
        map.on('popupclose', function() { setTimeout(function() { isPopupOpen = false; }, 100); });

        map.on('click', function(e) {
            if (isPopupOpen) return;

            if (activeSubLayer) {
                activeSubLayer.setStyle({ color: 'transparent', weight: 0 });
                map.removeLayer(activeSubMarker);
                activeSubLayer = null;
                activeSubMarker = null;
                return; 
            }
            
            clickCount++; 

            if (clickCount === 1) {
                clickTimer = setTimeout(function() {
                    clickCount = 0; 
                    
                    var lat = e.latlng.lat;
                    var lng = e.latlng.lng;
                    var naverPinUrl = `https://m.map.naver.com/map.naver?lat=${lat}&lng=${lng}&title=선택지점`;

                    var popupContent = `
                        <div style="text-align: center; margin: 2px;">
                            <a href="${naverPinUrl}" target="_blank" rel="noreferrer noopener" style="color: #03C75A; text-decoration: none; border-radius: 6px; font-weight: bold; display: block;">
                                네이버 지도로 보기
                            </a>
                        </div>`;
                    L.popup().setLatLng(e.latlng).setContent(popupContent).openOn(map);
                    
                }, 150); 
                
            } else if (clickCount >= 2) {
                map.setZoomAround(e.latlng, map.getZoom() + 1);
                clearTimeout(clickTimer); 
                clickCount = 0; 
            }
        });

        // [4] 아이폰 나침반 스크립트
        document.getElementById('iphone-compass-btn').addEventListener('click', function() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            alert('✅ 센서 활성화 완료! 내 위치 버튼을 눌러주세요.');
                            this.style.display = 'none'; 
                        }
                    })
                    .catch(console.error);
            } else {
                this.style.display = 'none';
            }
        });
    </script>
</body>
</html>
